name: Update citations

on:
  schedule:
    - cron: "0 3 * * 1"   # every Monday 03:00 UTC
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install scraper (used when no SerpApi key is configured)
        run: pip install scholarly
      - name: Fetch latest citations from Google Scholar
        env:
          # Optional: add a free SerpApi key as a repo secret for reliable updates.
          # Settings → Secrets and variables → Actions → New repository secret: SERPAPI_API_KEY
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: python scripts/update_citations.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- data/citations.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/citations.json
            git commit -m "chore: auto-update citations [skip ci]"
            git push
          else
            echo "No citation changes."
          fi
